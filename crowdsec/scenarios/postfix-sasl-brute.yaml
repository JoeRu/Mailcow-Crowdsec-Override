type: leaky
name: local/postfix-sasl-brute
description: "Ban IPs that produce 2+ SASL failure events within 4h — catches single-attempt distributed brute force"
filter: "evt.Meta.log_type_enh == 'spam-attempt'"
groupby: "evt.Meta.source_ip"
capacity: 1
leakspeed: "4h"
blackhole: "2m"
labels:
  service: postfix
  type: bruteforce
  remediation: true
