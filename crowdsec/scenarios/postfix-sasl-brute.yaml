type: leaky
name: local/postfix-sasl-brute
description: "Ban IPs that produce 3+ SASL failure events within 2h — requires 2 failed connections before banning"
filter: "evt.Meta.log_type_enh == 'spam-attempt'"
groupby: "evt.Meta.source_ip"
capacity: 2
leakspeed: "2h"
blackhole: "2m"
labels:
  service: postfix
  type: bruteforce
  remediation: true
